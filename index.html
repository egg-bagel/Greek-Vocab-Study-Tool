<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/style.css">
  <title>Greek Verbs</title>
</head>

<body>
  <h1>Greek Verb Parsing Quizzer</h1>

  <!-- Mode selection (shown on load) -->
  <div id="modeSelect">
    <button id="GrkToEng">Greek to English</button>
    <button id="EngToGrk">English to Greek</button>
    <button id="PrincipalParts">Principal Parts Practice</button>
  </div>

  <!-- Quiz screen (hidden on load) -->
<div id="quizScreen" class="hidden">

  <!-- Mode 1: Greek form shown, user picks parse -->
  <div id="mode1" class="hidden">
    <h3 id="challenge"></h3>
    <!-- five dropdowns + submit -->
    <label for="person">
      <select name="person" id="person">
        <option value="1st">1st</option>
        <option value="2nd">2nd</option>
        <option value="3rd">3rd</option>
      </select>
    </label>
    <label for="number">
      <select name="number" id="number">
        <option value="singular">singular</option>
        <option value="plural">plural</option>
      </select>
    </label>
    <label for="tense">
      <select name="tense" id="tense">
        <option value="present">present</option>
        <option value="imperfect">imperfect</option>
        <option value="future">future</option>
        <option value="aorist">aorist</option>  
        <option value="perfect">perfect</option>
        <option value="pluperfect">pluperfect</option>
        <option value="futurePerfect">future perfect</option>
      </select>
    </label>
    <label for="mood">
      <select name="mood" id="mood">
        <option value="indicative">indicative</option>
        <option value="subjunctive">subjunctive</option>
        <option value="optative">optative</option>
        <option value="imperative">imperative</option>
      </select>
    </label>
    <label for="voice">
      <select name="voice" id="voice">
        <option value="active">active</option>
        <option value="middle">middle</option>
        <option value="passive">passive</option>
      </select>
    </label>

    <button id="submitParse">Check Answer</button>
    <button id="showAnswerParse">Show Answer</button>
    <button class="next">Next Question</button>
  </div>

  <!-- Mode 2: Parse shown, user types Greek form -->
  <div id="mode2" class="hidden">
    <h3 id="challenge2"></h3>
    <h4 id="formSpecs"></h4>
    <input type="text" id="userAnswer" placeholder="Type answer here">
    <button id="submitVerbForm">Check Answer</button>
    <button id="showAnswerForm">Show Answer</button>
    <button class="next">Next Question</button>
  </div>

  <!-- Mode 3: Dictionary entry shown, user types all 6 principal parts -->
  <div id="mode3" class="hidden">
    <h3 id="challenge3"></h3>
    <div id="ppInputs">
      <input type="text" id="pp1" placeholder="1st">
      <input type="text" id="pp2" placeholder="2nd">
      <input type="text" id="pp3" placeholder="3rd">
      <input type="text" id="pp4" placeholder="4th">
      <input type="text" id="pp5" placeholder="5th">
      <input type="text" id="pp6" placeholder="6th">
    </div>
    <button id="submitPrincipalParts">Check Answer</button>
    <button id="showAnswerPP">Show Answer</button>
    <button class="next">Next Question</button>
  </div>

  <p id="feedback"></p>
  <button id="backToMenu">← Back to menu</button>
</div>

  <script src="/app.js"></script>
</body>
</html>
